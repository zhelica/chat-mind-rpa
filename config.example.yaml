dbkey:   # 数据库加密密钥，必须设置

# AES加密用的密钥和XOR，格式为字符串, 设置为空，自动查找
# 示例：aes_xor_key: 1234567890,17
aes_xor_key:

# MCP服务配置
mcp:
  # 监听主机地址，通常为0.0.0.0表示所有网卡
  host: 0.0.0.0
  # 监听端口
  port: 8000

dingtalk:
  # 钉钉机器人Webhook地址，当微信异常时，将推送异常消息和登录二维码
  webhook_url: https://example.com/robot/send?access_token=YOUR_DINGTALK_TOKEN

logging:
  # 日志文件最多保留数量
  backup_count: 5
  # 日志级别，可选：DEBUG/INFO/WARNING/ERROR
  level: INFO
  # 单个日志文件最大字节数
  max_size: 10485760
  # 日志文件存放路径
  path: logs

mqtt:
  # MQTT客户端ID前缀
  client_id: weixin_omni
  # MQTT服务器地址
  host: 127.0.0.1
  # MQTT密码
  password: 'YOUR_MQTT_PASSWORD'
  # MQTT端口
  port: 1883
  # MQTT用户名
  username: weixin

plugins:
  # 图片密钥辅助插件
  image-aes-plugin:
    enabled: true
  # 空群屏蔽插件
  block-empty-room-plugin:
    enabled: true
    priority: 2000
  # 聊天上下文插件
  chat-context-plugin:
    enabled: true
    priority: 1999
  # OpenAI对话插件
  openai-bot-plugin:
    enabled: true
    priority: 1497
    openai_api_key: YOUR_OPENAI_API_KEY
    openai_base_url: http://example.com:7860
    openai_model: gemini-2.0-flash  # 使用的模型名
    prompt: 你是一个聊天机器人，请根据用户的问题给出回答。历史对话：{{chat_history}} 当前时间：{{time_now}} 
      你的昵称：{{self_nickname}} 群昵称：{{room_nickname}} 消息来自于：{{contact_nickname}}
  # 自发消息插件
  self-msg-plugin:
    enabled: true
    priority: 1998

rpa:
  # RPA相关参数
  action_delay: 0.3  # 操作延迟（秒）
  scroll_delay: 1  # 滚动延迟（秒）
  max_retries: 3  # 最大重试次数
  switch_contact_delay: 0.3  # 切换联系人延迟（秒）
  ocr:
    merge_threshold: 5.0  # OCR合并阈值
    min_confidence: 0.5  # 最小置信度
    remote_url: http://example.com/ocr  # 远程OCR服务地址
    use_remote: false  # 是否使用远程OCR
  room_action_offset:
  - 0
  - -30
  search_contact_offset:
  - 0
  - 40
  side_bar_delay: 3
  timeout: 30
  window_margin: 20
  window_show_delay: 1.5
  short_term_rate: 0.15
  short_term_capacity: 2
  long_term_rate: 0.25
  long_term_capacity: 10

# RPA API 服务配置（可选）
# 提供 HTTP REST API 接口，允许外部系统直接调用 RPA 任务
# 服务地址: http://<host>:<port> (默认 http://0.0.0.0:8001)
rpa_api:
  enabled: false  # 是否启用，默认关闭
  host: 0.0.0.0  # 监听地址
  port: 8001  # 监听端口
  # 接口回调地址，当收到消息时POST到该地址（留空则不回调）
  callback_url: ""
  # 延迟处理秒数（默认30秒，与message_service保持一致）
  process_delay: 30
  # 是否启用自动消费（message_service自动处理消息）
  auto_consume: true
  # 是否启用API消费（通过API接口处理消息）
  api_consume: true

  # API接口说明：
  # -----------------------------------------------------------
  # POST /api/v1/send/text - 发送文本消息
  #   请求: {"recipient_name": "联系人", "message": "消息内容", "at_user_name": null}
  #   响应: {"success": true, "task_id": "xxx", "message": "消息已提交到队列"}
  #
  # POST /api/v1/send/file - 发送文件
  #   请求: {"recipient_name": "联系人", "file_path": "文件路径"}
  #
  # POST /api/v1/recall/message - 撤回消息（三种方式）
  #   方式1: {"contact_name": "联系人", "message_text": "消息内容", "similarity": 0.6}
  #   方式2: {"contact_name": "联系人", "keyword": "关键词"}
  #   方式3: {"contact_name": "联系人", "recall_latest": true}
  # -----------------------------------------------------------
  #
  # 示例cURL调用:
  #   curl -X POST "http://localhost:8001/api/v1/send/text" \
  #     -H "Content-Type: application/json" \
  #     -d '{"recipient_name": "张三", "message": "你好"}'
  #
  #   curl -X POST "http://localhost:8001/api/v1/recall/message" \
  #     -H "Content-Type: application/json" \
  #     -d '{"contact_name": "张三", "recall_latest": true}'

